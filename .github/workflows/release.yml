name: Release

on:
  push:
    tags:
      - 'v*'

# Top-level read-only; write scopes are granted only to the one job that
# needs them (principle of least privilege — scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # GitHub Release
      packages: write      # ghcr.io
      id-token: write      # cosign keyless OIDC
      attestations: write  # build attestation
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # GoReleaser's image_templates use {{ .Version }} which strips the leading
      # `v` from the tag, so the published image is `:0.1.0-alpha`, not
      # `:v0.1.0-alpha`. Anything in this workflow that references the image
      # tag must use the same form.
      - name: Compute image tag (no leading v)
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # GoReleaser's `sboms:` block invokes `syft` directly. Install it here
      # so the binary is on PATH before `goreleaser release` runs.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifests and DeepCopy code
        run: make manifests generate

      # GoReleaser owns dist/ and runs --clean on it, so we can't put anything
      # there before it runs. The install.yaml gets generated AFTER goreleaser
      # finishes (see "Build installer bundle" below).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pull the freshly-published image into the local docker daemon so syft
      # can scan it locally instead of trying to authenticate against the
      # private ghcr.io registry on its own.
      - name: Pull image for SBOM
        run: docker pull ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}

      - name: Generate SBOM for image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}
          format: spdx-json
          output-file: image.sbom.spdx.json
          upload-artifact: false

      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}

      - name: Attach SBOM to image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attach sbom --sbom image.sbom.spdx.json ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}
          cosign sign --yes --attachment sbom ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}

      # Now that goreleaser is done with dist/, build the install.yaml bundle
      # and attach it to the GitHub Release. `make build-installer` mutates
      # config/manager/kustomization.yaml, but the workspace is only used for
      # this final step so the dirty state is harmless.
      - name: Build installer bundle
        run: make build-installer IMG=ghcr.io/projection-operator/projection:${{ steps.tag.outputs.version }}

      - name: Upload install.yaml to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/install.yaml
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

name: OpenSSF Scorecard

on:
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    # Weekly on Sundays at 07:00 UTC
    - cron: '0 7 * * 0'
  push:
    branches:
      - main

permissions: read-all

# The scorecard job must contain ONLY steps with `uses:` — no `run:` steps —
# because `publish_results: true` uploads signed results to the public
# securityscorecards.dev webapp, and the webapp rejects runs that have any
# bespoke shell steps (see ossf/scorecard-action#workflow-restrictions).
# If you ever take this repo private again, remove `publish_results: true`
# instead of adding a visibility-check `run:` step — the latter breaks publishing.
jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif

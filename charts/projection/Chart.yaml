apiVersion: v2
name: projection
description: The Kubernetes CRD for declarative resource mirroring across namespaces.
type: application
version: 0.3.2
appVersion: "0.3.2"
kubeVersion: ">=1.32.0-0"
home: https://docs.projection.sh
sources:
  - https://github.com/projection-operator/projection
maintainers:
  - name: be0x74a
    email: maintainers@projection.sh
    url: https://github.com/be0x74a
keywords:
  - kubernetes
  - operator
  - mirror
  - reflector
  - configmap
  - secret
  - cross-namespace
  - replication
  - projection
icon: https://raw.githubusercontent.com/projection-operator/projection/main/docs/assets/logo.svg
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Full Lifecycle
  artifacthub.io/prerelease: "false"
  artifacthub.io/alternativeName: projection-operator
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.projection.sh
    - name: Source
      url: https://github.com/projection-operator/projection
    - name: Issues
      url: https://github.com/projection-operator/projection/issues
    - name: Changelog
      url: https://github.com/projection-operator/projection/blob/main/CHANGELOG.md
    - name: support
      url: https://github.com/projection-operator/projection/issues
  artifacthub.io/crds: |
    - kind: Projection
      version: v1
      name: projections.projection.sh
      displayName: Projection
      description: Namespaced single-target mirror of one Kubernetes object into the Projection's own namespace, with an optional name override and label/annotation overlay.
    - kind: ClusterProjection
      version: v1
      name: clusterprojections.projection.sh
      displayName: ClusterProjection
      description: Cluster-scoped fan-out mirror of one Kubernetes object into many destination namespaces, selected by an explicit list or a label selector.
  artifacthub.io/crdsExamples: |
    - apiVersion: projection.sh/v1
      kind: Projection
      metadata:
        name: app-config-to-tenant-a
        namespace: tenant-a
      spec:
        source:
          kind: ConfigMap
          namespace: default
          name: app-config
    - apiVersion: projection.sh/v1
      kind: ClusterProjection
      metadata:
        name: app-config-fanout
      spec:
        source:
          kind: ConfigMap
          namespace: default
          name: app-config
        destination:
          namespaceSelector:
            matchLabels:
              projection.sh/mirror: "true"
        overlay:
          labels:
            projected-by: projection
